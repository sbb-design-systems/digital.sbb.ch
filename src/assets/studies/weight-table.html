<!DOCTYPE html>
<html lang="de">
  <head>
    <title>Übersicht Heben, Halten und Tragen von Gewichten</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style type="text/css">

      html {
        font-size: 100%;
      }

      body {
        color: #333;
        font-family: "Open Sans", "Arial", sans-serif;
      }

      table  {
        border-collapse: collapse;
        border-spacing: 0;
        max-width: 36rem;
        min-width: 30rem;
        text-align: left;
        width: 100%;
      }

      table th {
        background-color: #f8f8f8;
      }

      table th, td {
        border-color: #c1c1c1;
        border-style: solid;
        border-width: 1px;
        font-weight: normal;
        overflow: hidden;
        padding: 0.5rem 0.5rem;
        word-break: normal;
      }
      
    </style>
  </head>
  <body>

    <table>
      <thead>
        <tr>
          <th rowspan="2"></th>
          <th rowspan="2">Last</th>
          <th colspan="2">Häufigkeit</th>
        </tr>
        <tr>
          <th>Frauen</th>
          <th>Männer</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="3">Heben</td>
          <td>5 bis 10 kg</td>
          <td>100×</td>
          <td>150×</td>
        </tr>
        <tr>
          <td>10 bis 15 kg</td>
          <td>50×</td>
          <td>100×</td>
        </tr>
        <tr>
          <td>15 bis 20 kg</td>
          <td></td>
          <td>50×</td>
        </tr>
        <tr>
          <td rowspan="3">Halten und Tragen mit einer<br> Dauer von etwa 5 Sekunden</td>
          <td>5 bis 10 kg</td>
          <td>60×</td>
          <td>80×</td>
        </tr>
        <tr>
          <td>10 bis 15 kg</td>
          <td>30×</td>
          <td>60×</td>
        </tr>
        <tr>
          <td>15 bis 20 kg</td>
          <td></td>
          <td>30×</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
